version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    # Bundle all GitHub Actions bumps into a single weekly PR instead of one each.
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
    # The RuneLite client uses a dynamic `latest.release` version and is not
    # managed here; this covers the pinned deps (Lombok, JUnit).
    groups:
      gradle:
        patterns:
          - "*"
