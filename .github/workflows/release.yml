name: Release to plugin hub

# When a GitHub Release is published (or this is run manually), open/update a PR
# against runelite/plugin-hub that pins the hub to this repo's released commit.
# The branch is pushed to the prettyrocket/plugin-hub fork; the PR targets upstream
# master. No version bump is involved — the hub shows the pinned commit.
on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: plugin-hub-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/hub-verify.yml
    with:
      commit: ${{ github.sha }}

  hub-pr:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout runelite/plugin-hub (base)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: runelite/plugin-hub
          ref: master

      - name: Sync the fork's master with upstream
        # create-pull-request force-pushes the branch (rebased onto upstream master) to the
        # fork. If the fork trails upstream, that push carries upstream commits that touch
        # .github/workflows/ — which GitHub rejects for a PAT lacking `workflow` scope. Bringing
        # the fork's master up to date first means only the manifest commit is new on the push.
        env:
          GH_TOKEN: ${{ secrets.PLUGIN_HUB_TOKEN }}
        run: gh api -X POST repos/prettyrocket/plugin-hub/merge-upstream -f branch=master

      - name: Pin manifest to the released commit
        run: |
          cat > plugins/better-monster-examine <<EOF
          repository=${{ github.server_url }}/${{ github.repository }}.git
          commit=${{ github.sha }}
          EOF
          echo "Manifest now reads:"
          cat plugins/better-monster-examine

      - name: Resolve the release notes
        id: notes
        # On `release: published` the notes ride in on the event payload; on a manual
        # workflow_dispatch there is none, so fall back to the latest release. Everything is
        # passed through env (never inlined into the script) so notes content can't inject shell.
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REL_TAG: ${{ github.event.release.tag_name }}
          REL_URL: ${{ github.event.release.html_url }}
          REL_NAME: ${{ github.event.release.name }}
          REL_BODY: ${{ github.event.release.body }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$REL_TAG"; url="$REL_URL"; name="$REL_NAME"; body="$REL_BODY"
          else
            tag="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName)"
            url="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json url -q .url)"
            name="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json name -q .name)"
            body="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json body -q .body)"
          fi
          echo "tag=${tag:-the latest release}" >> "$GITHUB_OUTPUT"
          commit_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/$SHA"
          {
            echo "PR_BODY<<__HUB_PR_BODY__"
            echo "Updates **Better Monster Examine** to [\`$SHA\`]($commit_url)."
            echo ""
            echo "Released as **${name:-$tag}** — $url"
            echo ""
            echo "---"
            echo ""
            echo "$body"
            echo "__HUB_PR_BODY__"
          } >> "$GITHUB_ENV"

      - name: Open or update the hub PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PLUGIN_HUB_TOKEN }}
          push-to-fork: prettyrocket/plugin-hub
          base: master
          branch: better-monster-examine-release
          delete-branch: true
          commit-message: "better-monster-examine: update to ${{ github.sha }}"
          title: "better-monster-examine: update to ${{ steps.notes.outputs.tag }}"
          body: ${{ env.PR_BODY }}
