name: Release to plugin hub

# When a GitHub Release is published (or this is run manually), open/update a PR
# against runelite/plugin-hub that pins the hub to this repo's released commit.
# The branch is pushed to the prettyrocket/plugin-hub fork; the PR targets upstream
# master. No version bump is involved — the hub shows the pinned commit.
on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: plugin-hub-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Run the real plugin-hub packager against this commit before opening the hub PR.
  # This is the exact check upstream CI runs (the same bundled package.jar), so a build
  # the hub would reject — e.g. constructing fresh Gson instances — fails here and the
  # hub-pr job below never runs. Our own ./gradlew build can't catch this; the verifier
  # only exists in the packager. Mirrors runelite/plugin-hub's build.yml layout exactly:
  # hub repo in ./plugin-hub, bundle (package.jar, gradle/, prepare.sh) extracted at root.
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout runelite/plugin-hub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: runelite/plugin-hub
          ref: master
          path: plugin-hub
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 11

      - name: Fetch the hub packager bundle
        env:
          PACKAGER_URL: "https://github.com/runelite/plugin-hub-tooling/releases/download/v1/bundle.tar.zst"
        run: |
          set -exu
          curl --location --fail --retry 4 --max-time 30 --output bundle.tar.zst "$PACKAGER_URL"
          tar xf bundle.tar.zst

      - name: Prepare api files + gradle deps
        run: ./prepare.sh

      - name: Pin the manifest to this commit
        run: |
          cat > plugin-hub/plugins/better-monster-examine <<EOF
          repository=${{ github.server_url }}/${{ github.repository }}.git
          commit=${{ github.sha }}
          EOF
          echo "Verifying manifest:"
          cat plugin-hub/plugins/better-monster-examine

      - name: Run the hub packager (verify only, no upload)
        env:
          FORCE_BUILD: better-monster-examine
        run: java -XX:+UseParallelGC -cp package.jar net.runelite.pluginhub.packager.Packager

  hub-pr:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout runelite/plugin-hub (base)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: runelite/plugin-hub
          ref: master

      - name: Pin manifest to the released commit
        run: |
          cat > plugins/better-monster-examine <<EOF
          repository=${{ github.server_url }}/${{ github.repository }}.git
          commit=${{ github.sha }}
          EOF
          echo "Manifest now reads:"
          cat plugins/better-monster-examine

      - name: Open or update the hub PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PLUGIN_HUB_TOKEN }}
          push-to-fork: prettyrocket/plugin-hub
          base: master
          branch: better-monster-examine-release
          delete-branch: true
          commit-message: "better-monster-examine: update to ${{ github.sha }}"
          title: "better-monster-examine: update to latest release"
          body: |
            Updates **Better Monster Examine** to [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            ${{ github.event.release.html_url }}
